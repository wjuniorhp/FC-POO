<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cardápio</title>
    <link rel="stylesheet" href="style2.css" />
</head>

<body>
    <h1>Gestão de Cardápio</h1>

    <form id="formulario-cadastro" class="formulario">
        <div class="titulos-form">
            <h2>Cadastrar Prato</h2>
            <p>Preencha os campos abaixo para adicionar um novo prato ao cardápio.</p>
        </div>
        <input type="text" id="nome" placeholder="Nome do prato" />
        <input type="text" id="preco" placeholder="Preco do prato" />
        <input type="text" id="imagem" placeholder="URL da imagem" />
        <textarea id="descricao" placeholder="Descrição do prato"></textarea>
        <div class="div-botao">
            <button id="botao-cadastrar" class="botao">Cadastrar</button>
        </div>
    </form>

    <div id="cardapio"></div>
    <script src="script.js"></script>
</body>

</html>
