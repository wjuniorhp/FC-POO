<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Cardápio</h1>

    <form id="formulario-cadastro">
        <h2>Cadastrar Prato</h2>
        <input type="text" id="nome" placeholder="Nome do prato">
        <input type="number" id="preco" placeholder="Preco do prato">
        <input type="text" id="imagem" placeholder="URL da imagem do prato">
        <textarea id="descricao" placeholder="Descrição do prato"></textarea>
        <button id="botao-cadastrar">Cadastrar</button>
    </form>

    <div id="cardapio"></div>
    <script src="script.js"></script>
</body>
</html>
